name: Angular CI/CD

on:
  push:
    branches: [ "master" ]
    paths:
      - 'library-ui/**'
      - '.github/workflows/angular_deploy.yml'

jobs:
  build:
    uses: ./.github/workflows/angular_build.yml

  deploy:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: library-ui
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-dist
          path: library-ui/dist/library-ui/browser

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload JS/CSS Assets
        run: |
          aws s3 sync dist/library-ui/browser s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html
        run: |
          aws s3 cp dist/library-ui/browser/index.html \
            s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html"