name: Spring Boot Deploy

on:
  push:
    branches: [ "master" ]
    paths:
      - 'library-app/**'
      - '.github/workflows/spring-boot_deploy.yml'

jobs:
  build:
    uses: ./.github/workflows/spring-boot_build.yml
    secrets: inherit

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      - name: Rename JAR
        run: mv *.jar app.jar

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "app.jar"
          target: "/tmp"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl stop myapp
            
            sudo mv /tmp/app.jar /opt/myapp/app.jar
            sudo chown springboot:springboot /opt/myapp/app.jar
            
            sudo systemctl start myapp
            
            sleep 10
            
            sudo systemctl status myapp --no-pager
