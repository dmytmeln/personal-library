name: Angular CI

on:
  pull_request:
    branches: [ "master" ]
    paths:
      - 'library-ui/**'
      - '.github/workflows/angular_build.yml'
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: library-ui
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: library-ui/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Angular App
        run: npm run prod

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: library-ui/dist/library-ui/browser/
          retention-days: 1
