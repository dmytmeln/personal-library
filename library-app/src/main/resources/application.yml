spring:
  application:
    name: library
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      default_batch_fetch_size: ${application.pagination.max-page-size}
      jdbc:
        batch_size: 20
      order_inserts: true
      order_updates: true
  liquibase:
    enabled: true


server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework


application:
  pagination:
    default-page-size: 20
    max-page-size: 50
    min-page-size: 1
  recommendations:
    trigger:
      count: 50
      days: 14
    rebuild:
      batch-size: 100
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-expiration: 1800000
      refresh-expiration: 86400000
      access-cookie-name: library_app_jwt_access_token
      refresh-cookie-name: library_app_jwt_refresh_token
      refresh-id-cookie-name: library_app_jwt_refresh_id
      token-cleanup-cron: "0 0 3 * * ?"
  ai:
    groq:
      api-key: ${GROQ_API_KEY:}
      base-url: https://api.groq.com/openai/v1
      model: whisper-large-v3-turbo
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: gemini-2.5-flash
      temperature: 0.7
  voice-note:
    max-duration-seconds: 180
    min-duration-seconds: 1

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    tags:
      application: ${spring.application.name}
