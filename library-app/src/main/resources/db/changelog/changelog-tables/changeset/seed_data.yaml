databaseChangeLog:
  - changeSet:
      id: seed_categories
      author: Dmytro Melnyk
      context: "!test"
      changes:
        - loadData:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  type: NUMERIC
            file: db/changelog/changelog-tables/changeset/seed_data/categories.csv

  - changeSet:
      id: seed_category_translations
      author: Dmytro Melnyk
      context: "!test"
      changes:
        - loadData:
            tableName: category_translations
            columns:
              - column:
                  name: category_id
                  type: NUMERIC
              - column:
                  name: language_code
                  type: STRING
              - column:
                  name: name
                  type: STRING
              - column:
                  name: description
                  type: STRING
            file: db/changelog/changelog-tables/changeset/seed_data/category_translations.csv
            encoding: UTF-8

  - changeSet:
      id: seed_authors
      author: Dmytro Melnyk
      context: "!test"
      changes:
        - loadData:
            tableName: authors
            columns:
              - column:
                  name: author_id
                  type: NUMERIC
              - column:
                  name: birth_year
                  type: NUMERIC
              - column:
                  name: death_year
                  type: NUMERIC
            file: db/changelog/changelog-tables/changeset/seed_data/authors.csv

  - changeSet:
      id: seed_author_translations
      author: Dmytro Melnyk
      context: "!test"
      changes:
        - loadData:
            tableName: author_translations
            columns:
              - column:
                  name: author_id
                  type: NUMERIC
              - column:
                  name: language_code
                  type: STRING
              - column:
                  name: full_name
                  type: STRING
              - column:
                  name: country
                  type: STRING
              - column:
                  name: biography
                  type: STRING
            file: db/changelog/changelog-tables/changeset/seed_data/author_translations.csv
            encoding: UTF-8

  - changeSet:
      id: seed_books
      author: Dmytro Melnyk
      context: "!test"
      changes:
        - loadData:
            tableName: books
            columns:
              - column:
                  name: book_id
                  type: NUMERIC
              - column:
                  name: category_id
                  type: NUMERIC
              - column:
                  name: publish_year
                  type: NUMERIC
              - column:
                  name: pages
                  type: NUMERIC
              - column:
                  name: cover_image_url
                  type: STRING
            file: db/changelog/changelog-tables/changeset/seed_data/books.csv

  - changeSet:
      id: seed_book_translations
      author: Dmytro Melnyk
      context: "!test"
      changes:
        - loadData:
            tableName: book_translations
            columns:
              - column:
                  name: book_id
                  type: NUMERIC
              - column:
                  name: language_code
                  type: STRING
              - column:
                  name: title
                  type: STRING
              - column:
                  name: book_language
                  type: STRING
              - column:
                  name: description
                  type: STRING
            file: db/changelog/changelog-tables/changeset/seed_data/book_translations.csv
            encoding: UTF-8

  - changeSet:
      id: seed_book_authors
      author: Dmytro Melnyk
      context: "!test"
      changes:
        - loadData:
            tableName: book_authors
            columns:
              - column:
                  name: book_id
                  type: NUMERIC
              - column:
                  name: author_id
                  type: NUMERIC
            file: db/changelog/changelog-tables/changeset/seed_data/book_authors.csv
