databaseChangeLog:
  - changeSet:
      id: create_table_books
      author: Dmytro Melnyk
      changes:
        - createSequence:
            sequenceName: books_seq
            startValue: 56
            incrementBy: 20
        - createTable:
            tableName: books
            columns:
              - column:
                  name: book_id
                  type: integer
                  constraints:
                    primaryKey: true
                    primaryKeyName: books_pk
              - column:
                  name: category_id
                  type: integer
                  constraints:
                    nullable: false
                    foreignKeyName: books_categories_fk
                    referencedTableName: categories
                    referencedColumnNames: category_id
              - column:
                  name: publish_year
                  type: smallint
                  constraints:
                    nullable: false
              - column:
                  name: pages
                  type: smallint
                  constraints:
                    nullable: false
              - column:
                  name: cover_image_url
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: embedding
                  type: vector(384)
                  constraints:
                    nullable: true
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: NEW
                  constraints:
                    nullable: false
              - column:
                  name: popularity_count
                  type: integer
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

  - changeSet:
      id: create_table_book_translations
      author: Dmytro Melnyk
      changes:
        - createTable:
            tableName: book_translations
            columns:
              - column:
                  name: book_id
                  type: integer
                  constraints:
                    nullable: false
                    foreignKeyName: book_translations_books_fk
                    referencedTableName: books
                    referencedColumnNames: book_id
                    deleteCascade: true
              - column:
                  name: language_code
                  type: varchar(2)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: book_language
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
                  constraints:
                    nullable: true
        - addPrimaryKey:
            tableName: book_translations
            columnNames: book_id, language_code
            constraintName: book_translations_pk
