databaseChangeLog:
  - changeSet:
      id: create_table_library_books
      author: Dmytro Melnyk
      changes:
        - createSequence:
            sequenceName: library_books_seq
            startValue: 1
            incrementBy: 20
        - createTable:
            tableName: library_books
            columns:
              - column:
                  name: library_book_id
                  type: integer
                  constraints:
                    primaryKey: true
                    primaryKeyName: library_books_pk
              - column:
                  name: user_id
                  type: integer
                  constraints:
                    nullable: false
                    foreignKeyName: library_books_users_fk
                    referencedTableName: users
                    referencedColumnNames: user_id
              - column:
                  name: book_id
                  type: integer
                  constraints:
                    nullable: false
                    foreignKeyName: library_books_books_fk
                    referencedTableName: books
                    referencedColumnNames: book_id
              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: added_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: finished_at
                  type: date
              - column:
                  name: rating
                  type: tinyint
                  constraints:
                    nullable: true
              - column:
                  name: title
                  type: varchar(255)
              - column:
                  name: publish_year
                  type: smallint
              - column:
                  name: pages
                  type: smallint
              - column:
                  name: language
                  type: varchar(50)
              - column:
                  name: description
                  type: text
              - column:
                  name: location
                  type: varchar(255)
              - column:
                  name: cover_image_url
                  type: varchar(1024)
